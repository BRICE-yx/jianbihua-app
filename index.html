    :root {
      color-scheme: light;
      --bg: #f7f7f5;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #64707d;
      --line: #d8dedc;
      --accent: #167c6b;
      --accent-soft: #e8f4f1;
      --shadow: 0 10px 28px rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 20px 14px 40px;
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 2;
      margin: 0 -14px 12px;
      padding: 16px 14px 14px;
      background: rgba(247, 247, 245, 0.94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(216, 222, 220, 0.8);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .search-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 18px;
      outline: none;
      box-shadow: var(--shadow);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22, 124, 107, 0.14), var(--shadow);
    }

    button {
      flex: 0 0 auto;
      height: 48px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font: inherit;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    .status {
      margin: 10px 2px 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 58px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .name {
      min-width: 0;
      font-size: 19px;
      font-weight: 650;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .number {
      flex: 0 0 auto;
      min-width: 54px;
      padding: 5px 8px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      text-align: center;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }

    mark {
      padding: 0 2px;
      border-radius: 3px;
      background: #fff1a8;
      color: inherit;
    }

    .empty {
      padding: 28px 12px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.55);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 520px) {
      main {
        padding-top: 12px;
      }

      h1 {
        font-size: 20px;
      }

      .results {
        grid-template-columns: 1fr;
      }

      .item {
        min-height: 56px;
      }
    }
  </style>
</head>

    const searchInput = document.querySelector("#search");

    const results = document.querySelector("#results");
    const status = document.querySelector("#status");

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function highlight(value, query) {
      if (!query) return escapeHtml(value);
      const index = value.indexOf(query);
      if (index === -1) return escapeHtml(value);
      const before = escapeHtml(value.slice(0, index));
      const match = escapeHtml(value.slice(index, index + query.length));
      const after = escapeHtml(value.slice(index + query.length));
      return `${before}<mark>${match}</mark>${after}`;
    }

    function render(items, query) {
      if (!items.length) {
        results.className = "empty";
        results.textContent = "没有找到匹配结果";
        status.textContent = `未找到“${query}”`;
        return;
      }

      results.className = "results";
      results.innerHTML = items.map(item => `
        <article class="item">
          <div class="name">${highlight(item.name, query)}</div>
          <div class="number" aria-label="页码 ${item.number}">${highlight(item.number, query)}</div>
        </article>
      `).join("");

      if (query) {
        status.textContent = `找到 ${items.length} 个结果，数字为页码/目录号`;
      } else {
        status.textContent = `共 ${DATA.length} 条，输入一个字也可以查`;
      }
    }

    function score(item, query) {
      if (!query) return 0;
      if (item.number === query.padStart(3, "0")) return 0;
      if (item.name === query) return 1;
      if (item.name.startsWith(query)) return 2;
      if (item.name.includes(query)) return 3;
      if (item.number.includes(query)) return 4;
      return 9;
    }

    function update() {
      const query = searchInput.value.trim();
      const items = DATA
        .filter(item => !query || item.name.includes(query) || item.number.includes(query))
        .sort((a, b) => score(a, query) - score(b, query) || a.number.localeCompare(b.number));
      render(items, query);
    }

    searchInput.addEventListener("input", update);
    clearButton.addEventListener("click", () => {
      searchInput.value = "";
      searchInput.focus();
      update();
    });

    update();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
