<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>简笔画</title>
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="简笔画">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon-v2.png">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
  <header class="app-bar">
    <div class="bar-inner">
      <div class="brand">
        <button id="brand-easter-trigger" class="brand-trigger" type="button" aria-label="简笔画">
          <img src="./assets/icons/icon-192-v2.png" alt="" width="38" height="38">
        </button>
        <h1>简笔画</h1>
        <span id="data-badge" class="data-badge">加载中</span>
      </div>
      <nav class="tabs" aria-label="主要视图">
        <button class="tab is-active" type="button" data-view="home" aria-pressed="true">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8"></path><path d="M5 10v10h14V10"></path><path d="M9 20v-6h6v6"></path></svg>
          搜索
        </button>
        <button class="tab" type="button" data-view="library" aria-pressed="false">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5V5a2 2 0 0 1 2-2h13v18H6a2 2 0 0 1-2-1.5Z"></path><path d="M8 7h7"></path><path d="M8 11h7"></path></svg>
          书库
        </button>
        <button class="tab" type="button" data-view="settings" aria-pressed="false">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.04.04a2 2 0 1 1-2.83 2.83l-.04-.04A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.06a1.7 1.7 0 0 0-.4-1.1 1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.88.34l-.04.04a2 2 0 1 1-2.83-2.83l.04-.04A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.06a1.7 1.7 0 0 0 1.1-.4 1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.34-1.88l-.04-.04a2 2 0 1 1 2.83-2.83l.04.04A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.06a1.7 1.7 0 0 0 .4 1.1 1.7 1.7 0 0 0 1 .6 1.7 1.7 0 0 0 1.88-.34l.04-.04a2 2 0 1 1 2.83 2.83l-.04.04A1.7 1.7 0 0 0 19.4 9c.23.37.6.6 1 .6h.1a2 2 0 1 1 0 4h-.06a1.7 1.7 0 0 0-1.04.4c-.27.23-.48.58-.6 1Z"></path></svg>
          设置
        </button>
      </nav>
    </div>
  </header>

  <main>
    <section id="view-home" class="view" aria-label="首页">
      <div class="home-grid">
        <section class="panel search-panel" aria-labelledby="search-title">
          <div class="section-head">
            <h2 id="search-title">搜索</h2>
            <div id="search-meta" class="meta"></div>
          </div>
          <form id="search-form" class="search-form">
            <div class="search-box">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
              <input id="search-input" type="search" placeholder="名称、页码、分类、书名" autocomplete="off" autofocus>
            </div>
            <button id="clear-search" class="icon-button" type="button" title="清空" aria-label="清空搜索">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
            </button>
          </form>
          <div id="quick-terms" class="toolbar" aria-label="快捷关键词"></div>
          <div id="home-status" class="home-status" aria-live="polite"></div>
          <div id="daily-topic" class="daily-topic"></div>
          <div id="quick-stats" class="quick-stats"></div>
        </section>

        <section class="panel library-entry" aria-labelledby="books-title" hidden>
          <div class="section-head">
            <h2 id="books-title">书库</h2>
            <div id="books-meta" class="meta"></div>
          </div>
          <div id="home-books" class="book-grid"></div>
        </section>
      </div>

      <section class="results-section" aria-labelledby="results-title">
        <div class="result-tools">
          <h2 id="results-title">结果</h2>
          <div id="results-summary" class="meta"></div>
        </div>
        <div id="results" class="result-groups" aria-live="polite"></div>
      </section>
    </section>

    <section id="view-library" class="view" aria-label="书库" hidden>
      <div class="library-layout">
        <aside class="panel library-panel library-side">
          <div>
            <div class="section-head">
              <h2>书籍</h2>
            </div>
            <div id="library-book-filters" class="filter-list"></div>
          </div>
          <div>
            <div class="section-head">
              <h2>分类</h2>
            </div>
            <div id="library-category-filters" class="filter-list"></div>
          </div>
        </aside>
        <section class="panel library-panel library-main">
          <div class="library-heading">
            <div>
              <h2 id="library-title">书库</h2>
              <div id="library-subtitle" class="status-line"></div>
            </div>
            <div id="library-image-status" class="meta"></div>
          </div>
          <div id="library-items" class="library-items"></div>
        </section>
      </div>
    </section>

    <section id="view-settings" class="view" aria-label="设置" hidden>
      <div class="panel settings-panel">
        <div class="section-head">
          <h2>设置</h2>
          <div id="settings-data-meta" class="meta"></div>
        </div>
        <div class="settings-grid">
          <section class="settings-block" aria-labelledby="data-settings-title">
            <h3 id="data-settings-title">数据</h3>
            <div class="action-row">
              <button id="check-update" class="action" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.5 6.2"></path><path d="M3 12A9 9 0 0 1 18.5 5.8"></path><path d="M18 2v4h-4"></path><path d="M6 22v-4h4"></path></svg>
                检查更新
              </button>
            </div>
            <div id="update-status" class="status-line"></div>
          </section>

          <section class="settings-block" aria-labelledby="cache-settings-title">
            <h3 id="cache-settings-title">缓存</h3>
            <div class="action-row">
              <button id="cache-all" class="action" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5 5 5-5"></path><path d="M12 15V3"></path></svg>
                <span id="cache-all-label">缓存全部图片</span>
              </button>
              <button id="clear-cache" class="action secondary" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="m19 6-1 14H6L5 6"></path><path d="M10 11v5"></path><path d="M14 11v5"></path></svg>
                清理图片缓存
              </button>
            </div>
            <div class="progress-track" aria-hidden="true">
              <div id="cache-progress-bar" class="progress-bar"></div>
            </div>
            <div id="cache-status" class="cache-progress"></div>
          </section>

          <section class="settings-block" aria-labelledby="stats-settings-title">
            <h3 id="stats-settings-title">统计</h3>
            <div id="stats-summary" class="stats-list"></div>
            <div id="hot-keywords" class="stats-pills"></div>
            <div class="action-row">
              <button id="clear-stats" class="action secondary" type="button">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="m19 6-1 14H6L5 6"></path></svg>
                清空统计
              </button>
            </div>
          </section>

          <section class="settings-block" aria-labelledby="about-settings-title">
            <h3 id="about-settings-title">状态</h3>
            <div id="app-status" class="stats-list"></div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <dialog id="item-dialog">
    <div class="modal-layout">
      <div id="modal-image-stage" class="image-stage"></div>
      <aside class="modal-side">
        <div class="modal-title-row">
          <h2 id="modal-title" class="modal-title"></h2>
          <button id="close-dialog" class="close-button" type="button" aria-label="关闭">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
          </button>
        </div>
        <div id="modal-meta" class="detail-meta"></div>
        <div class="pager">
          <button id="prev-image" type="button" aria-label="上一张">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
          </button>
          <div id="pager-status" class="pager-status"></div>
          <button id="next-image" type="button" aria-label="下一张">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"></path></svg>
          </button>
        </div>
      </aside>
    </div>
  </dialog>

  <dialog id="easter-dialog">
    <div class="easter-modal">
      <div id="easter-image-stage" class="easter-image-stage"></div>
      <div class="easter-side">
        <div class="modal-title-row">
          <h2 id="easter-title" class="modal-title"></h2>
          <button id="close-easter-dialog" class="close-button" type="button" aria-label="关闭">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
          </button>
        </div>
        <div id="easter-meta" class="detail-meta"></div>
        <div class="pager">
          <button id="prev-easter" type="button" aria-label="上一张">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
          </button>
          <div id="easter-pager-status" class="pager-status"></div>
          <button id="next-easter" type="button" aria-label="下一张">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"></path></svg>
          </button>
        </div>
      </div>
    </div>
  </dialog>

  <script src="./assets/js/main.js"></script>
</body>
</html>
