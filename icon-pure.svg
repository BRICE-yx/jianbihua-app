    <path d="M235 373l44-72 44 72v292c0 41-28 66-59 66s-58-25-58-66V431z" fill="#ffd070" class="ink"/>
    <path d="M235 373l44-72 44 72-29 18h-30z" fill="#ffe2ad"/>
    <path d="M249 343l30-42 30 42z" fill="#050505"/>
    <path d="M206 431c35 22 82 22 117 0" fill="none" class="ink"/>
    <path d="M206 665c33 20 84 20 117 0" fill="none" class="ink"/>
    <path d="M206 665v39c0 38 28 64 58 64s59-26 59-64v-39" fill="#f56fa5" class="ink"/>
