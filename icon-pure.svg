    <path d="M762 551v2" fill="none" class="ink"/>
    <path d="M762 604v40" fill="none" class="ink"/>

    <circle cx="452" cy="428" r="24" fill="#050505"/>
    <circle cx="626" cy="428" r="24" fill="#050505"/>
    <circle cx="466" cy="416" r="8" fill="#fff"/>
    <circle cx="640" cy="416" r="8" fill="#fff"/>
    <path d="M505 457c5 38 69 38 76 0" fill="none" class="ink"/>

    <path d="M423 521h246" class="soft-line"/>
    <path d="M423 565h246" class="soft-line"/>
