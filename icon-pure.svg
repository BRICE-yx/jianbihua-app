<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">简笔画图标</title>
  <desc id="desc">彩色圆角边框中的可爱铅笔和微笑图画本图标</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6bd6ef"/>
      <stop offset="1" stop-color="#44c7db"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#45d3b7"/>
      <stop offset="1" stop-color="#8edc7d"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f85e"/>
      <stop offset="1" stop-color="#ffaf2e"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9eb8"/>
      <stop offset="1" stop-color="#f3568d"/>
    </linearGradient>
    <linearGradient id="paperBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d8edf5"/>
    </linearGradient>
    <linearGradient id="paperPink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb5c6"/>
      <stop offset="1" stop-color="#f58ba9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#263238" flood-opacity=".12"/>
    </filter>
    <style>
      .ink{stroke:#050505;stroke-width:24;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#050505;stroke-width:18;stroke-linecap:round;stroke-linejoin:round}
      .soft-line{stroke:#bed4de;stroke-width:16;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1024" height="1024" rx="188" fill="#fff"/>

  <path d="M0 0h290c-120 24-218 92-260 196C9 248 0 304 0 370z" fill="url(#sky)"/>
  <path d="M0 270h118v458H0z" fill="#45c7d7"/>
