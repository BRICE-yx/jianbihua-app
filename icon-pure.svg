    <path d="M294 434v224" stroke="#ffe0a2" stroke-width="18" stroke-linecap="round"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M368 335h300c54 0 94 40 94 94v205c0 54-40 94-94 94H379c-35 0-57 20-64 48v-347c0-54 40-94 94-94h127" fill="url(#paperBlue)" class="ink"/>
